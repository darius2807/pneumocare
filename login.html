<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - PneumoCare</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="login.css">
</head>

<script>

function login(e){

    e.preventDefault();

    localStorage.setItem("isLogin","true");

    window.location.href = "index.html";

}

</script>

<body>

<div class="login-container">

    <div class="left-side">

        <div class="logo-box">
            <i class="fa-solid fa-heart-pulse"></i>
        </div>

        <h1>PneumoCare</h1>

        <p>
            Asisten Cerdas Paru Sehat Berbasis AI
        </p>

        <div class="feature-list">

            <div>
                <i class="fa-solid fa-lungs"></i>
                Skrining Pneumonia
            </div>

            <div>
                <i class="fa-solid fa-heart-pulse"></i>
                Analisis Risiko
            </div>

            <div>
                <i class="fa-solid fa-robot"></i>
                Konsultasi AI
            </div>

        </div>

    </div>

    <div class="right-side">

        <div class="login-card">

            <h2>Selamat Datang</h2>

            <p>
                Masuk untuk melanjutkan ke PneumoCare
            </p>

            <form onsubmit="login(event)">

                <div class="input-group">

                    <label>Email</label>

                    <input
                    type="email"
                    placeholder="nama@email.com"
                    required>

                    </div>

                <div class="input-group">

                    <label>Password</label>

                    <div class="password-box">

                        <input
                        id="password"
                        type="password"
                        placeholder="Masukkan password">
                        

                        <button
                        type="button"
                        class="eye-btn"
                        onclick="togglePassword()">

                            <i class="fa-solid fa-eye"></i>

                        </button>

                    </div>

                </div>

                <div class="remember">

                    <label>

                        <input type="checkbox">
                        Ingatkan Saya
                    </label>

                    <a href="#">
                        Lupa Password?
                    </a>

                </div>

                <button
                type="submit"
                class="login-btn">

                    Masuk

                </button>

                <div class="divider">
                    ATAU
                </div>

                <button
                type="button"
                class="google-btn">

                    <i class="fa-brands fa-google"></i>

                    Masuk dengan Google

                </button>

            </form>

            <div class="register">

                Belum punya akun?

                <a href="#">
                    Daftar Sekarang
                </a>

            </div>

        </div>

    </div>

</div>

<script>

function togglePassword(){

    const password =
    document.getElementById("password");

    if(password.type === "password"){
        password.type = "text";
    }else{
        password.type = "password";
    }

}

</script>

</body>
</html>
